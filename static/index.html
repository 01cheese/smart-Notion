<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --fg: #1a1a18;
    --fg-dim: #888882;
    --accent: #1a1a18;
    --border: #e8e8e4;
    --popup-bg: #ffffff;
    --popup-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    --radius: 10px;
    --font-body: 'EB Garamond', Georgia, serif;
    --font-ui: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-size: 18px;
    --line-height: 1.75;
    --max-width: 680px;
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="dark"] {
    --bg: #111110;
    --fg: #e8e8e2;
    --fg-dim: #555550;
    --accent: #e8e8e2;
    --border: #2a2a28;
    --popup-bg: #1e1e1c;
    --popup-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
  }

  [data-theme="sepia"] {
    --bg: #f5f0e8;
    --fg: #2c2416;
    --fg-dim: #9a8870;
    --border: #e0d8c8;
    --popup-bg: #faf6ee;
  }

  [data-theme="midnight"] {
    --bg: #0d0f14;
    --fg: #c8d0e0;
    --fg-dim: #404860;
    --border: #1e2230;
    --popup-bg: #141620;
    --popup-shadow: 0 8px 40px rgba(0,0,0,0.8);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: var(--font-size);
    line-height: var(--line-height);
    transition: background var(--transition), color var(--transition);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Auth Screen ─────────────────────────────────── */
  #auth-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    background: var(--bg);
    z-index: 1000;
    transition: opacity 0.4s ease;
  }
  #auth-screen.hidden { opacity: 0; pointer-events: none; }

  .auth-wordmark {
    font-family: var(--font-body);
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--fg-dim);
    text-transform: uppercase;
  }

  .auth-google-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 22px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition);
    letter-spacing: 0.01em;
  }
  .auth-google-btn:hover { background: var(--border); }

  .auth-google-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ── Editor ──────────────────────────────────────── */
  #app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 96px 32px 200px;
  }

  #editor-wrap {
    width: 100%;
    max-width: var(--max-width);
    position: relative;
  }

  #editor {
    outline: none;
    min-height: calc(100vh - 300px);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: var(--font-size);
    line-height: var(--line-height);
    caret-color: var(--fg);
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
    transition: color var(--transition);
  }

  #editor:empty::before {
    content: attr(data-placeholder);
    color: var(--fg-dim);
    pointer-events: none;
    position: absolute;
  }

  /* Rich text styles inside editor */
  #editor h1 { font-size: 2em; font-weight: 600; margin: 0.6em 0 0.2em; line-height: 1.2; }
  #editor h2 { font-size: 1.45em; font-weight: 600; margin: 0.7em 0 0.2em; line-height: 1.3; }
  #editor h3 { font-size: 1.15em; font-weight: 600; margin: 0.8em 0 0.15em; }
  #editor p { margin: 0.15em 0; }
  #editor ul, #editor ol { padding-left: 1.5em; margin: 0.2em 0; }
  #editor li { margin: 0.1em 0; }
  #editor blockquote {
    border-left: 2px solid var(--fg-dim);
    padding-left: 1em;
    margin: 0.5em 0 0.5em 0;
    color: var(--fg-dim);
    font-style: italic;
  }
  #editor code {
    font-family: var(--font-mono);
    font-size: 0.82em;
    background: var(--border);
    padding: 0.1em 0.35em;
    border-radius: 4px;
  }
  #editor pre {
    font-family: var(--font-mono);
    font-size: 0.82em;
    background: var(--border);
    padding: 1em 1.2em;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.6em 0;
    line-height: 1.6;
  }
  #editor pre code { background: none; padding: 0; }
  #editor hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  #editor strong { font-weight: 600; }
  #editor em { font-style: italic; }
  #editor a { color: var(--fg); text-decoration: underline; text-underline-offset: 3px; }
  #editor mark { background: rgba(255, 220, 80, 0.35); padding: 0 0.1em; border-radius: 2px; }

  /* ── Selection AI Popup ──────────────────────────── */
  #sel-popup {
    position: fixed;
    display: none;
    align-items: center;
    gap: 2px;
    background: var(--popup-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px;
    box-shadow: var(--popup-shadow);
    z-index: 500;
    animation: popIn 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #sel-popup.visible { display: flex; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .sel-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    background: transparent;
    border: none;
    border-radius: 5px;
    color: var(--fg);
    font-family: var(--font-ui);
    font-size: 12.5px;
    font-weight: 400;
    cursor: pointer;
    white-space: nowrap;
    transition: background var(--transition);
    letter-spacing: 0.01em;
  }
  .sel-btn:hover { background: var(--border); }
  .sel-btn svg { width: 12px; height: 12px; opacity: 0.7; }

  .sel-divider {
    width: 1px; height: 16px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── AI Loading indicator ────────────────────────── */
  .ai-thinking {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--fg-dim);
    font-size: 0.85em;
    font-family: var(--font-ui);
  }
  .ai-thinking span {
    width: 4px; height: 4px;
    background: var(--fg-dim);
    border-radius: 50%;
    animation: pulse 1.2s ease infinite;
  }
  .ai-thinking span:nth-child(2) { animation-delay: 0.2s; }
  .ai-thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Settings Panel (Ctrl+K) ─────────────────────── */
  #settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    z-index: 800;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 120px;
    animation: fadeIn 0.15s ease;
  }
  #settings-overlay.visible { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #settings-panel {
    background: var(--popup-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 420px;
    max-width: calc(100vw - 40px);
    box-shadow: var(--popup-shadow);
    overflow: hidden;
    animation: slideDown 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .settings-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .settings-title {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }
  .settings-close {
    background: none; border: none;
    color: var(--fg-dim); cursor: pointer;
    padding: 2px; border-radius: 4px;
    display: flex; align-items: center;
    transition: color var(--transition);
    font-size: 18px; line-height: 1;
  }
  .settings-close:hover { color: var(--fg); }

  .settings-body { padding: 8px 0 12px; }

  .settings-section {
    padding: 10px 20px 8px;
  }
  .settings-section-label {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 10px;
  }

  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 20px;
  }
  .settings-row-label {
    font-family: var(--font-ui);
    font-size: 13.5px;
    color: var(--fg);
    font-weight: 400;
  }

  /* Options pill group */
  .option-pills {
    display: flex; gap: 4px;
  }
  .option-pill {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    font-family: var(--font-ui);
    font-size: 12px;
    cursor: pointer;
    transition: all var(--transition);
  }
  .option-pill.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  /* Font size control */
  .font-size-ctrl {
    display: flex; align-items: center; gap: 8px;
  }
  .font-size-ctrl button {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
    font-family: var(--font-ui);
  }
  .font-size-ctrl button:hover { background: var(--border); }
  .font-size-ctrl span {
    font-family: var(--font-ui);
    font-size: 13px;
    min-width: 28px;
    text-align: center;
    color: var(--fg);
  }

  /* Gemini key input */
  .key-input-wrap { padding: 8px 20px 4px; }
  .key-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color var(--transition);
    letter-spacing: 0.05em;
  }
  .key-input:focus { border-color: var(--fg-dim); }
  .key-input::placeholder { color: var(--fg-dim); letter-spacing: 0; font-family: var(--font-ui); }

  .settings-sep { height: 1px; background: var(--border); margin: 8px 0; }

  /* Auth row */
  .auth-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px;
  }
  .user-info {
    display: flex; align-items: center; gap: 8px;
  }
  .user-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    object-fit: cover;
  }
  .user-email {
    font-family: var(--font-ui);
    font-size: 12.5px;
    color: var(--fg-dim);
  }
  .sign-out-btn {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--fg-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 5px;
    transition: color var(--transition), background var(--transition);
  }
  .sign-out-btn:hover { color: var(--fg); background: var(--border); }

  /* keyboard hint */
  .kbd {
    display: inline-flex; align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    background: var(--border);
    border-radius: 4px;
    color: var(--fg-dim);
    letter-spacing: 0;
  }

  /* Save indicator */
  #save-indicator {
    position: fixed;
    bottom: 28px;
    right: 28px;
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--fg-dim);
    opacity: 0;
    transition: opacity 0.4s ease;
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  #save-indicator.visible { opacity: 1; }

  /* AI result inline highlight */
  .ai-result-highlight {
    background: rgba(100, 180, 100, 0.2);
    border-radius: 2px;
    transition: background 2s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-wordmark">void</div>
  <button class="auth-google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>
</div>

<!-- Main App -->
<div id="app" style="display:none">
  <div id="editor-wrap">
    <div
      id="editor"
      contenteditable="true"
      data-placeholder="start writing…"
      spellcheck="true"
    ></div>
  </div>
</div>

<!-- Selection Popup -->
<div id="sel-popup">
  <button class="sel-btn" onclick="selAction('copy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
    Copy
  </button>
  <div class="sel-divider"></div>
  <button class="sel-btn" onclick="selAction('continue')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
    Continue
  </button>
  <button class="sel-btn" onclick="selAction('explain')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
    </svg>
    Explain
  </button>
  <button class="sel-btn" onclick="selAction('replace')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Improve
  </button>
</div>

<!-- Settings Panel -->
<div id="settings-overlay" onclick="closeSettings(event)">
  <div id="settings-panel">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span class="kbd">Ctrl K</span>
        <button class="settings-close" onclick="closeSettings()">×</button>
      </span>
    </div>
    <div class="settings-body">

      <!-- User -->
      <div class="auth-row">
        <div class="user-info">
          <img id="user-avatar" class="user-avatar" src="" alt="" onerror="this.style.display='none'">
          <span id="user-email" class="user-email">—</span>
        </div>
        <button class="sign-out-btn" onclick="signOut()">Sign out</button>
      </div>

      <div class="settings-sep"></div>

      <!-- Appearance -->
      <div class="settings-section">
        <div class="settings-section-label">Appearance</div>

        <div class="settings-row">
          <span class="settings-row-label">Theme</span>
          <div class="option-pills" id="theme-pills">
            <button class="option-pill" data-val="light" onclick="setSetting('theme','light',this)">Light</button>
            <button class="option-pill" data-val="dark" onclick="setSetting('theme','dark',this)">Dark</button>
            <button class="option-pill" data-val="sepia" onclick="setSetting('theme','sepia',this)">Sepia</button>
            <button class="option-pill" data-val="midnight" onclick="setSetting('theme','midnight',this)">Midnight</button>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-row-label">Font</span>
          <div class="option-pills" id="font-pills">
            <button class="option-pill" data-val="serif" onclick="setSetting('font','serif',this)">Serif</button>
            <button class="option-pill" data-val="sans" onclick="setSetting('font','sans',this)">Sans</button>
            <button class="option-pill" data-val="mono" onclick="setSetting('font','mono',this)">Mono</button>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-row-label">Size</span>
          <div class="font-size-ctrl">
            <button onclick="changeFontSize(-1)">−</button>
            <span id="font-size-display">18</span>
            <button onclick="changeFontSize(1)">+</button>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-row-label">Width</span>
          <div class="option-pills" id="width-pills">
            <button class="option-pill" data-val="600" onclick="setSetting('width','600',this)">Narrow</button>
            <button class="option-pill" data-val="680" onclick="setSetting('width','680',this)">Normal</button>
            <button class="option-pill" data-val="820" onclick="setSetting('width','820',this)">Wide</button>
          </div>
        </div>
      </div>

      <div class="settings-sep"></div>

      <!-- AI -->
      <div class="settings-section">
        <div class="settings-section-label">AI — Gemini 3.1 Flash Lite Preview</div>
      </div>
      <div class="key-input-wrap">
        <input
          id="gemini-key-input"
          class="key-input"
          type="password"
          placeholder="Paste your Gemini API key…"
          autocomplete="off"
          oninput="scheduleKeySave()"
        >
      </div>
      <div style="padding:6px 20px 4px">
        <span style="font-family:var(--font-ui);font-size:11px;color:var(--fg-dim)">
          Select text in the editor to get AI actions.
        </span>
      </div>

    </div>
  </div>
</div>

<!-- Save indicator -->
<div id="save-indicator">saved</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let sbClient = null;   // Supabase client (avoid clash with window.supabase lib)
let session = null;

// settings: UI prefs stored in localStorage, gemini_key/model synced to DB
let settings = {
  font: 'serif', theme: 'midnight', font_size: 18, width: '680',
  gemini_key: '', gemini_model: 'gemini-3.1-flash-lite-preview'
};
let saveTimer = null;
let keySaveTimer = null;
let selectionText = '';
let selectionRange = null;

// ── Supabase ──────────────────────────────────────────────────────────────────
async function initSupabase() {
  const cfg = await fetch('/api/config').then(r => r.json());
  await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js');
  // window.supabase = the library; sbClient = our instance
  sbClient = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key, {
    auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
  });
  const { data: { session: s } } = await sbClient.auth.getSession();
  if (s) { session = s; onSignedIn(); } else { showAuth(); }
  sbClient.auth.onAuthStateChange((_event, s) => {
    session = s;
    if (s) onSignedIn(); else showAuth();
  });
}

// Authenticated client — injects JWT so RLS passes
function db() {
  return window.supabase.createClient(
    sbClient.supabaseUrl,
    sbClient.supabaseKey,
    {
      global: { headers: { Authorization: `Bearer ${session.access_token}` } },
      auth: { persistSession: false }
    }
  );
}

function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
}

async function signInWithGoogle() {
  await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin }
  });
}

async function signOut() {
  clearTimeout(saveTimer);
  await saveNote();
  await sbClient.auth.signOut();
  closeSettings();
}

async function onSignedIn() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  const user = session.user;
  document.getElementById('user-email').textContent = user.email || '';
  const avatar = document.getElementById('user-avatar');
  if (user.user_metadata?.avatar_url) avatar.src = user.user_metadata.avatar_url;
  await Promise.all([loadSettings(), loadNote()]);
}

// ── Settings ──────────────────────────────────────────────────────────────────
// UI prefs (font/theme/size/width) → localStorage only
// AI prefs (gemini_key/model) → Supabase user_settings table

function loadLocalSettings() {
  try {
    const saved = localStorage.getItem('void_ui_settings');
    if (saved) {
      const parsed = JSON.parse(saved);
      settings = { ...settings, ...parsed };
    }
  } catch {}
}

function saveLocalSettings() {
  try {
    localStorage.setItem('void_ui_settings', JSON.stringify({
      font: settings.font,
      theme: settings.theme,
      font_size: settings.font_size,
      width: settings.width
    }));
  } catch {}
}

async function loadSettings() {
  loadLocalSettings();
  // Load AI keys from DB
  try {
    const { data, error } = await db()
      .from('user_settings')
      .select('gemini_key, gemini_model')
      .eq('user_id', session.user.id)
      .maybeSingle();
    if (!error && data) {
      if (data.gemini_key) settings.gemini_key = data.gemini_key;
      if (data.gemini_model) settings.gemini_model = data.gemini_model;
    }
  } catch (err) {
    console.error('[loadSettings]', err);
  }
  applySettings();
  syncSettingsUI();
}

async function saveAISettingsToDB() {
  if (!session) return;
  try {
    const { error } = await db()
      .from('user_settings')
      .upsert({
        user_id: session.user.id,
        gemini_key: settings.gemini_key,
        gemini_model: settings.gemini_model
      }, { onConflict: 'user_id' });
    if (error) console.error('[saveAISettings]', error);
  } catch (err) {
    console.error('[saveAISettings exception]', err);
  }
}

function applySettings() {
  const fontMap = {
    serif: "'EB Garamond', Georgia, serif",
    sans:  "'DM Sans', system-ui, sans-serif",
    mono:  "'JetBrains Mono', monospace"
  };
  document.documentElement.style.setProperty('--font-body', fontMap[settings.font] || fontMap.serif);
  document.documentElement.style.setProperty('--font-size', (settings.font_size || 18) + 'px');
  document.documentElement.style.setProperty('--max-width', (settings.width || 680) + 'px');
  document.documentElement.setAttribute('data-theme', settings.theme || 'light');
}

function syncSettingsUI() {
  document.querySelectorAll('#theme-pills .option-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.val === settings.theme));
  document.querySelectorAll('#font-pills .option-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.val === settings.font));
  document.querySelectorAll('#width-pills .option-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.val === String(settings.width || 680)));
  document.getElementById('font-size-display').textContent = settings.font_size || 18;
  document.getElementById('gemini-key-input').value = settings.gemini_key || '';
}

function setSetting(key, value, btn) {
  settings[key] = key === 'font_size' ? parseInt(value) : value;
  const group = btn.closest('.option-pills');
  group.querySelectorAll('.option-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  applySettings();
  saveLocalSettings();
}

function changeFontSize(delta) {
  settings.font_size = Math.max(12, Math.min(32, (settings.font_size || 18) + delta));
  document.getElementById('font-size-display').textContent = settings.font_size;
  applySettings();
  saveLocalSettings();
}

function scheduleKeySave() {
  clearTimeout(keySaveTimer);
  keySaveTimer = setTimeout(() => {
    settings.gemini_key = document.getElementById('gemini-key-input').value.trim();
    saveAISettingsToDB();
  }, 800);
}

// ── Note ──────────────────────────────────────────────────────────────────────
async function loadNote() {
  try {
    const { data, error } = await db()
      .from('notes')
      .select('id, content_text, updated_at')
      .eq('user_id', session.user.id)
      .order('updated_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    if (error) { console.error('[loadNote]', error); return; }
    if (data && data.content_text) {
      document.getElementById('editor').innerHTML = data.content_text;
    }
  } catch (err) {
    console.error('[loadNote exception]', err);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNote, 1200);
}

async function saveNote() {
  if (!session) return;
  const content_text = document.getElementById('editor').innerHTML;
  try {
    const { data: existing, error: selErr } = await db()
      .from('notes')
      .select('id')
      .eq('user_id', session.user.id)
      .limit(1)
      .maybeSingle();

    if (selErr) throw selErr;

    if (existing) {
      const { error } = await db().from('notes')
        .update({ content_text })
        .eq('id', existing.id);
      if (error) throw error;
    } else {
      const { error } = await db().from('notes')
        .insert({ user_id: session.user.id, content_text });
      if (error) throw error;
    }
    flashSaved();
  } catch (err) {
    console.error('[saveNote error]', err);
  }
}

function flashSaved() {
  const el = document.getElementById('save-indicator');
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1400);
}

// ── Editor keyboard shortcuts ─────────────────────────────────────────────────
const editor = document.getElementById('editor');

editor.addEventListener('input', scheduleSave);

editor.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault(); openSettings(); return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
    e.preventDefault(); document.execCommand('bold'); return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
    e.preventDefault(); document.execCommand('italic'); return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
    e.preventDefault(); document.execCommand('underline'); return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
    return;
  }
  handleMarkdownShortcuts(e);
});

function handleMarkdownShortcuts(e) {
  if (e.key !== ' ') return;
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const node = range.startContainer;
  if (node.nodeType !== Node.TEXT_NODE) return;
  const text = node.textContent.substring(0, range.startOffset).trimStart();

  const headings = { '#': 'h1', '##': 'h2', '###': 'h3' };
  if (headings[text]) {
    e.preventDefault();
    const tag = headings[text];
    const block = node.parentElement.closest('div,p') || node.parentElement;
    const newEl = document.createElement(tag);
    newEl.innerHTML = '&#8203;';
    block.replaceWith(newEl);
    const r = document.createRange();
    r.setStart(newEl.childNodes[0], 1); r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
    return;
  }
  if (text === '>') {
    e.preventDefault();
    document.execCommand('formatBlock', false, 'blockquote');
    const s = window.getSelection();
    if (s.rangeCount) {
      const r = s.getRangeAt(0);
      if (r.startContainer.nodeType === Node.TEXT_NODE)
        r.startContainer.textContent = r.startContainer.textContent.replace(/^>\s*/, '');
    }
    return;
  }
  if (text === '-' || text === '*') {
    e.preventDefault();
    document.execCommand('insertUnorderedList');
    const s = window.getSelection();
    if (s.rangeCount && s.getRangeAt(0).startContainer.nodeType === Node.TEXT_NODE)
      s.getRangeAt(0).startContainer.textContent =
        s.getRangeAt(0).startContainer.textContent.replace(/^[-*]\s*/, '');
    return;
  }
  if (/^\d+\.$/.test(text)) {
    e.preventDefault();
    document.execCommand('insertOrderedList');
    const s = window.getSelection();
    if (s.rangeCount && s.getRangeAt(0).startContainer.nodeType === Node.TEXT_NODE)
      s.getRangeAt(0).startContainer.textContent =
        s.getRangeAt(0).startContainer.textContent.replace(/^\d+\.\s*/, '');
    return;
  }
}

editor.addEventListener('paste', e => {
  e.preventDefault();
  document.execCommand('insertText', false, e.clipboardData.getData('text/plain'));
});

// ── Selection popup ───────────────────────────────────────────────────────────
const selPopup = document.getElementById('sel-popup');

document.addEventListener('mouseup', e => {
  setTimeout(() => {
    if (selPopup.contains(e.target)) return;
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) { hideSelPopup(); return; }
    if (!editor.contains(sel.anchorNode)) { hideSelPopup(); return; }
    selectionText = sel.toString().trim();
    selectionRange = sel.getRangeAt(0).cloneRange();
    showSelPopup(sel);
  }, 10);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { hideSelPopup(); closeSettings(); }
});

function showSelPopup(sel) {
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  selPopup.classList.add('visible');
  const pw = selPopup.offsetWidth || 320;
  let left = rect.left + rect.width / 2 - pw / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
  const top = rect.top - selPopup.offsetHeight - 10 + window.scrollY;
  selPopup.style.left = left + 'px';
  selPopup.style.top = Math.max(8, top) + 'px';
}

function hideSelPopup() { selPopup.classList.remove('visible'); }

async function selAction(action) {
  if (action === 'copy') {
    navigator.clipboard.writeText(selectionText).catch(() => document.execCommand('copy'));
    hideSelPopup();
    return;
  }

  if (!settings.gemini_key) {
    alert('Add your Gemini API key in Settings (Ctrl+K).');
    hideSelPopup();
    return;
  }

  const btn = [...selPopup.querySelectorAll('.sel-btn')].find(b =>
    b.textContent.trim().toLowerCase().includes(action === 'replace' ? 'improve' : action));
  const origHTML = btn?.innerHTML || '';
  if (btn) btn.innerHTML = '<span class="ai-thinking"><span></span><span></span><span></span></span>';

  try {
    const response = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({
        action,
        selected_text: selectionText,
        context: editor.textContent.substring(0, 2000),
        gemini_api_key: settings.gemini_key,
        gemini_model: settings.gemini_model
      })
    });
    if (!response.ok) { const e = await response.json(); throw new Error(e.detail || 'AI error'); }
    const { result } = await response.json();
    applyAIResult(action, result);
  } catch (err) {
    alert('AI error: ' + err.message);
  } finally {
    if (btn) btn.innerHTML = origHTML;
    hideSelPopup();
  }
}

function applyAIResult(action, result) {
  if (!selectionRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(selectionRange);

  if (action === 'explain') {
    const range = selectionRange.cloneRange();
    range.collapse(false);
    const el = document.createElement('div');
    el.style.cssText = 'margin:12px 0;padding:12px 16px;border-left:2px solid var(--fg-dim);color:var(--fg-dim);font-size:0.9em;font-style:italic;border-radius:0 6px 6px 0;background:var(--border);';
    el.textContent = result;
    sel.removeAllRanges(); sel.addRange(range);
    sel.getRangeAt(0).insertNode(el);
  } else if (action === 'continue') {
    const range = selectionRange.cloneRange();
    range.collapse(false);
    sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('insertText', false, ' ' + result);
  } else if (action === 'replace') {
    document.execCommand('insertText', false, result);
  }
  scheduleSave();
}

// ── Settings panel ────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('settings-overlay').classList.add('visible');
  syncSettingsUI();
}

function closeSettings(e) {
  if (e && e.target !== document.getElementById('settings-overlay')) return;
  document.getElementById('settings-overlay').classList.remove('visible');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k' && !editor.matches(':focus')) {
    e.preventDefault(); openSettings();
  }
});

// ── Save on page close ────────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  clearTimeout(saveTimer);
  if (session) {
    const content_text = document.getElementById('editor').innerHTML;
    navigator.sendBeacon('/api/note/beacon', JSON.stringify({
      content: content_text,
      token: session.access_token
    }));
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
initSupabase();
</script>
